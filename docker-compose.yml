# AI_CBC MVP Deployment — Docker Compose
# Version: 1.0
# Maintainer: 小维 (DevOps/MLOps Engineer)

services:
  # ---------------------------------------------------------------------------
  # API Service — FastAPI application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aicbc-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - MONGODB_URL=mongodb://mongo:27017/aicbc
      - REDIS_URL=redis://redis:6379/0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=1
      - METRICS_PATH=/metrics
      - SLOW_REQUEST_THRESHOLD=5.0
      # LLM API keys should be injected via .env or secrets
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - aicbc-network

  # ---------------------------------------------------------------------------
  # Celery Worker — Background task processing
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aicbc-worker
    command: celery -A aicbc.tasks worker --loglevel=info --concurrency=2
    environment:
      - ENVIRONMENT=production
      - MONGODB_URL=mongodb://mongo:27017/aicbc
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - mongo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    networks:
      - aicbc-network

  # ---------------------------------------------------------------------------
  # Celery Beat — Scheduled tasks
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aicbc-beat
    command: celery -A aicbc.tasks beat --loglevel=info
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - aicbc-network

  # ---------------------------------------------------------------------------
  # MongoDB — Primary data store
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:6
    container_name: aicbc-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./backups/mongo:/backup
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - aicbc-network

  # ---------------------------------------------------------------------------
  # Redis — Cache and message broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aicbc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - aicbc-network

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy and load balancer
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: aicbc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - aicbc-network

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51
    container_name: aicbc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - aicbc-network

  # ---------------------------------------------------------------------------
  # Grafana — Metrics visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4
    container_name: aicbc-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - aicbc-network

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  aicbc-network:
    driver: bridge
