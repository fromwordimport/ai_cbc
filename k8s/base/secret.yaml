# AI_CBC Kubernetes Secret Template
# IMPORTANT: This is a template. Do NOT commit actual secrets.
# Use kubeseal or external secret management (Vault, Sealed Secrets) for production.
#
# To create the actual secret:
#   kubectl create secret generic aicbc-secrets \
#     --from-literal=anthropic-api-key=YOUR_KEY \
#     --from-literal=openai-api-key=YOUR_KEY \
#     --from-literal=secret-key=YOUR_SECRET \
#     --namespace=aicbc-prod
#
# For Sealed Secrets:
#   1. Install kubeseal: https://github.com/bitnami-labs/sealed-secrets
#   2. Create plain secret: kubectl create secret generic aicbc-secrets ... --dry-run=client -o yaml > secret.yaml
#   3. Seal it: kubeseal --format=yaml < secret.yaml > sealed-secret.yaml
#   4. Apply sealed secret: kubectl apply -f sealed-secret.yaml
#   5. Delete plain secret: rm secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: aicbc-secrets
  namespace: aicbc-prod
  annotations:
    sealedsecrets.bitnami.com/managed: "false"
    aicbc.internal/template: "true"
type: Opaque
data:
  # CI/CD 部署时替换：此文件中的 data 字段值必须由 CI/CD 流水线或外部密钥管理工具替换为真实 base64 编码的密钥。
  # 请勿在 Git 中提交真实密钥。
  # 推荐使用以下方案之一：
  #   1. kubeseal (Sealed Secrets): 将明文 Secret 加密后提交到 Git
  #      步骤: kubectl create secret generic ... --dry-run=client -o yaml | kubeseal --format=yaml > sealed-secret.yaml
  #   2. External Secrets Operator (ESO): 从外部密钥管理器 (AWS Secrets Manager, Azure Key Vault, Vault) 同步密钥
  #      参考: https://external-secrets.io/latest/
  #   3. CI/CD 变量注入: 在部署阶段通过环境变量替换占位符
  #      例如: sed -i "s/PLACEHOLDER_BASE64/$(echo -n $REAL_KEY | base64)/g" secret.yaml
  ANTHROPIC_API_KEY: "UkVQTEFDRV9XSVRIX0FDVFVBTF9LRVk="
  OPENAI_API_KEY: "UkVQTEFDRV9XSVRIX0FDVFVBTF9LRVk="
  SECRET_KEY: "UkVQTEFDRV9XSVRIX0FDVFVBTF9TRUNSRVQ="
  MONGODB_URL: "bW9uZ29kYjovL21vbmdvOjI3MDE3L2FpY2Jj"
  REDIS_PASSWORD: ""
