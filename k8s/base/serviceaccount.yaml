# AI_CBC Service Accounts
# Dedicated ServiceAccounts for each component with minimal privileges.
# automountServiceAccountToken: false unless the component needs K8s API access.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aicbc-api
  namespace: aicbc-prod
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aicbc-worker
  namespace: aicbc-prod
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aicbc-beat
  namespace: aicbc-prod
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aicbc-mongo
  namespace: aicbc-prod
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aicbc-redis
  namespace: aicbc-prod
automountServiceAccountToken: false
