# AI_CBC Celery Worker Deployment
# Runs background analysis tasks (HB/MNL/LatentClass) pulled from Redis.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicbc-worker
  namespace: aicbc-prod
  labels:
    app.kubernetes.io/name: aicbc
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: aicbc
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aicbc
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: aicbc-worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/fromwordimport/aicbc:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - src.aicbc.analysis.tasks
            - worker
            - --loglevel=info
            - --concurrency=2
            - -Q
            - analysis,default
          envFrom:
            - configMapRef:
                name: aicbc-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aicbc-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aicbc-secrets
                  key: OPENAI_API_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aicbc-secrets
                  key: SECRET_KEY
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - src.aicbc.analysis.tasks
                - inspect
                - ping
                - -d
                - celery@$HOSTNAME
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
