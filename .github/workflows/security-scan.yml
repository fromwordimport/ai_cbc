# AI_CBC Security Scan Workflow
# Maintainer: 小安 (Security Engineer)
# Version: 1.0

name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'
  pull_request:
    branches: [master]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'frontend/package-lock.json'
      - 'docker/**'
      - '.github/workflows/security-scan.yml'
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Python Dependency Vulnerability Scan
  # ==========================================================================
  python-dependency-scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -e ".[dev,analysis]"

      - name: Run pip-audit
        run: |
          source .venv/bin/activate
          pip install pip-audit
          pip-audit --desc --format=json -o pip-audit.json || true
          cat pip-audit.json
          python scripts/ci_check_pip_audit.py

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          retention-days: 30

  # ==========================================================================
  # Frontend Dependency Vulnerability Scan
  # ==========================================================================
  frontend-dependency-scan:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (JSON report)
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true
          cat npm-audit.json

      - name: Run npm audit (blocking)
        run: npm audit --audit-level=high

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit.json
          retention-days: 30

  # ==========================================================================
  # Container Image Security Scan
  # ==========================================================================
  container-scan:
    runs-on: ubuntu-22.04
    needs: [python-dependency-scan, frontend-dependency-scan]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t aicbc-security-scan:${{ github.sha }} .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          image-ref: 'aicbc-security-scan:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30

  # ==========================================================================
  # Secret Scan
  # ==========================================================================
  secret-scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@3.88.1
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ==========================================================================
  # K8s Manifest Security Validation
  # ==========================================================================
  k8s-manifest-security:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install pyyaml

      - name: Validate K8s manifests
        run: |
          source .venv/bin/activate
          python scripts/validate_k8s_manifests.py
