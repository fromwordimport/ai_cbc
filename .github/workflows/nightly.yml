# AI_CBC Nightly Pipeline
# Maintainer: 小测 (QA Engineer) / 小速 (Performance Engineer)
# Version: 1.0
# Runs the full test matrix (including slow tests), complete red-team tests,
# and an optional performance baseline against staging.

name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Full test suite (including slow tests)
  # ==========================================================================
  full-test:
    runs-on: ubuntu-22.04
    env:
      DEBUG: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/nightly.yml') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev build-essential

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -e ".[dev,analysis]"
          uv pip install mongomock-motor pytest-xdist

      - name: Run parallel test suite (unit/integration)
        env:
          PYTENSOR_FLAGS: "blas__ldflags=-lopenblas -L/usr/lib/x86_64-linux-gnu"
        run: |
          source .venv/bin/activate
          pytest tests/unit tests/integration \
            -v \
            --ignore=tests/unit/analysis \
            -m "not performance and not smoke and not redteam" \
            -n auto \
            --timeout=300 \
            --cov=src \
            --cov-report=term

      - name: Run serial analysis and e2e tests
        env:
          PYTENSOR_FLAGS: "blas__ldflags=-lopenblas -L/usr/lib/x86_64-linux-gnu"
        run: |
          source .venv/bin/activate
          pytest tests/unit/analysis tests/e2e \
            -v \
            -m "not performance and not smoke and not redteam" \
            --timeout=600 \
            --cov=src \
            --cov-append \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=test-results/full-serial.xml

      - name: Upload full test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-results
          path: |
            test-results/
            coverage.xml
            htmlcov/
          retention-days: 30

  # ==========================================================================
  # Complete red-team tests
  # ==========================================================================
  redteam-full:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/nightly.yml') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev build-essential

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -e ".[dev,analysis]"
          uv pip install mongomock-motor pytest-xdist

      - name: Run complete red-team tests
        env:
          PYTENSOR_FLAGS: "blas__ldflags=-lopenblas -L/usr/lib/x86_64-linux-gnu"
        run: |
          source .venv/bin/activate
          pytest tests/redteam/ \
            -v \
            -n auto \
            --timeout=600 \
            --junitxml=test-results/redteam-full.xml

      - name: Upload red-team results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-full-results
          path: |
            test-results/
            coverage.xml
          retention-days: 30

  # ==========================================================================
  # Performance baseline (best-effort against staging)
  # ==========================================================================
  performance:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/nightly.yml') }}

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install locust

      - name: Check staging reachability
        id: staging-check
        run: |
          if curl -sf --max-time 5 http://staging.aicbc.example.com/health >/dev/null; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Locust performance baseline
        if: steps.staging-check.outputs.reachable == 'true'
        continue-on-error: true
        run: |
          source .venv/bin/activate
          locust -f scripts/locust_baseline.py \
            --host http://staging.aicbc.example.com \
            --run-time 5m \
            --users 20 \
            --spawn-rate 5 \
            --headless \
            --html reports/locust-report.html \
            --csv reports/locust \
            || echo "Locust baseline skipped (staging not reachable)."

      - name: Run pytest performance regression
        run: |
          source .venv/bin/activate
          pytest tests/performance/ \
            -v \
            --timeout=300 \
            --junitxml=test-results/performance.xml

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: reports/locust*
          retention-days: 30
