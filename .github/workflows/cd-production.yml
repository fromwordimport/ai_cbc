# AI_CBC Production CD Pipeline
# Maintainer: 小维 (DevOps/MLOps Engineer)
# Version: 1.0
# Manually deploys a previously built and validated image to production.
# Requires GitHub Environment protection (Required reviewers) on `production`.

name: CD Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: current commit SHA)'
        required: false
        default: ''

concurrency:
  group: cd-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Verify the requested image exists in GHCR
  # ==========================================================================
  verify-image:
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Resolve image tag
        id: resolve
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          IMAGE="ghcr.io/${{ github.repository }}:${TAG}"
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Verifying image: ${IMAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect image manifest
        run: |
          docker buildx imagetools inspect "${{ steps.resolve.outputs.image }}"

  # ==========================================================================
  # Deploy to production cluster
  # ==========================================================================
  deploy-production:
    runs-on: ubuntu-22.04
    needs: verify-image
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.2'

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Cost fuse check
        run: |
          python3 scripts/ci_cost_fuse_check.py http://aicbc-api.aicbc-prod.svc.cluster.local/cost-status

      - name: Update image tag in production overlay
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ghcr.io/fromwordimport/ai_cbc=ghcr.io/${{ github.repository }}:${{ needs.verify-image.outputs.image_tag }}

      - name: Deploy to production
        run: |
          kubectl apply -k k8s/overlays/prod/

      - name: Wait for rollouts
        id: rollout
        run: |
          kubectl rollout status deployment/aicbc-api --namespace=aicbc-prod --timeout=300s
          kubectl rollout status deployment/aicbc-worker --namespace=aicbc-prod --timeout=300s
          kubectl rollout status deployment/aicbc-beat --namespace=aicbc-prod --timeout=300s

      - name: Health check
        id: health
        run: |
          kubectl run curl-health --rm -i --restart=Never \
            --namespace=aicbc-prod \
            --image=curlimages/curl:latest \
            --fail-with-body \
            -- http://aicbc-api.aicbc-prod.svc.cluster.local/health

      - name: Run smoke tests
        run: |
          # Lightweight standalone smoke-test runner; does not use the project's uv environment by design.
          python3 -m pip install pytest requests
          python3 -m pytest tests/smoke/ --base-url=http://aicbc-api.aicbc-prod.svc.cluster.local

      - name: Rollback instructions on failure
        if: failure()
        run: |
          echo "::error::Production deployment or health check failed."
          echo "To rollback, run:"
          echo "  kubectl rollout undo deployment/aicbc-api --namespace=aicbc-prod"
          echo "  kubectl rollout undo deployment/aicbc-worker --namespace=aicbc-prod"
          echo "  kubectl rollout undo deployment/aicbc-beat --namespace=aicbc-prod"
