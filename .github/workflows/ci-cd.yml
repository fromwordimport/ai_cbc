# AI_CBC CI/CD Pipeline
# Maintainer: 小维 (DevOps/MLOps Engineer)
# Version: 1.0

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, release/*, hotfix/*]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # Stage 0: Preflight Checks
  # ==========================================================================
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch naming
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          if [[ ! "$BRANCH" =~ ^(main|master|release/.*|hotfix/.*|feature/.*)$ ]]; then
            echo "Branch naming convention violated: $BRANCH"
            exit 1
          fi
          echo "Branch name OK: $BRANCH"

      - name: Check commit message format
        run: |
          COMMIT_MSG=$(git log --format=%s -n 1)
          if [[ ! "$COMMIT_MSG" =~ ^(feat|fix|docs|test|refactor|perf|security|cost)\(.+\):\ .+ ]]; then
            echo "Commit message format violation: $COMMIT_MSG"
            echo "Expected format: type(scope): description"
            exit 1
          fi
          echo "Commit message OK: $COMMIT_MSG"

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified

  # ==========================================================================
  # Stage 1: Code Quality
  # ==========================================================================
  quality:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          source .venv/bin/activate
          ruff check src/ --output-format=github

      - name: Format check with ruff
        run: |
          source .venv/bin/activate
          ruff format --check src/

      - name: Type check with mypy
        run: |
          source .venv/bin/activate
          mypy src/ --strict --ignore-missing-imports

      - name: Security scan with bandit
        run: |
          source .venv/bin/activate
          bandit -r src/ -f json -o bandit-report.json || true
          cat bandit-report.json || echo "No bandit report"

  # ==========================================================================
  # Stage 2: Security Scan
  # ==========================================================================
  security:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit -r pyproject.toml --desc --format=json -o pip-audit.json || true
          cat pip-audit.json || echo "No pip-audit report"

      - name: Build Docker image for scan
        run: |
          docker build -f docker/Dockerfile -t aicbc-scan:${{ github.sha }} .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'aicbc-scan:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't block on container scan for now

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==========================================================================
  # Stage 3: Unit Tests
  # ==========================================================================
  unit-test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev,analysis]"

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests/ \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=60 \
            --junitxml=test-results/unit.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            test-results/
            coverage.xml
            htmlcov/
          retention-days: 30

  # ==========================================================================
  # Stage 4: Build and Push
  # ==========================================================================
  build:
    runs-on: ubuntu-latest
    needs: [unit-test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  # ==========================================================================
  # Stage 5: Deploy Notification
  # ==========================================================================
  notify:
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success')
    steps:
      - name: Record deployment
        run: |
          cat <<EOF > deploy-record.json
          {
            "deploy_id": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref }}",
            "actor": "${{ github.actor }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "status": "${{ needs.build.result }}",
            "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          }
          EOF
          cat deploy-record.json

      - name: Notify Slack (if configured)
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "AI_CBC 镜像构建完成\n版本: ${{ github.sha }}\n分支: ${{ github.ref }}\n构建人: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
