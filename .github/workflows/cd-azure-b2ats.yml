# AI_CBC Azure B2ats v2 部署流水线
# 触发条件：master 分支 push 或手动触发
# 1. 构建并推送镜像到 GHCR
# 2. SSH 到 Azure VM 执行部署脚本

name: CD Azure B2ats v2

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: cd-azure-b2ats-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:master
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-22.04
    needs: build-push
    environment: azure-b2ats
    outputs:
      image_tag: ${{ needs.build-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: IMAGE_TAG
          script_stop: true
          script: |
            cd /opt/aicbc
            git fetch origin master
            if ! git diff --quiet HEAD; then
              echo "WARNING: 检测到本地变更，中止部署以防止数据丢失" >&2
              exit 1
            fi
            git reset --hard origin/master
            export IMAGE_TAG=${IMAGE_TAG}
            bash scripts/deploy-to-azure-b2ats.sh

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script_stop: true
          script: |
            for i in {1..30}; do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "部署后健康检查通过"
                exit 0
              fi
              echo "等待 API 健康... ($i/30)"
              sleep 2
            done
            echo "ERROR: 部署后健康检查失败" >&2
            exit 1
