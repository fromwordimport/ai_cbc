# AI_CBC CI Pipeline
# Maintainer: 小维 (DevOps/MLOps Engineer)
# Version: 2.0
# This workflow covers code quality, security scanning, unit tests,
# red-team tests, frontend build/test, and K8s manifest validation.
# Deployment and image push are handled by separate workflows.

name: CI

on:
  push:
    branches: [master, release/*, hotfix/*]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Stage 0: Preflight Checks
  # ==========================================================================
  preflight:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch naming
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          if [[ ! "$BRANCH" =~ ^(master|release/.*|hotfix/.*|feature/.*|worktree/.*|worktree-.*)$ ]]; then
            echo "Branch naming convention violated: $BRANCH"
            exit 1
          fi
          echo "Branch name OK: $BRANCH"

      - name: Check commit message format
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            COMMIT_SHA="HEAD"
          fi
          COMMIT_MSG=$(git log --format=%s -n 1 "$COMMIT_SHA")
          if [[ ! "$COMMIT_MSG" =~ ^(feat|fix|docs|test|refactor|perf|security|cost|chore|ci)\(.+\):\ .+ ]]; then
            echo "Commit message format violation: $COMMIT_MSG"
            echo "Expected format: type(scope): description"
            exit 1
          fi
          echo "Commit message OK: $COMMIT_MSG"

      - name: Determine TruffleHog base
        id: trufflehog-base
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              echo "base=${{ github.event.repository.default_branch }}" >> $GITHUB_OUTPUT
            else
              echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
            fi
          else
            echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          path: ./
          base: ${{ steps.trufflehog-base.outputs.base }}
          head: HEAD
          extra_args: --only-verified

  # ==========================================================================
  # Stage 1: Code Quality
  # ==========================================================================
  quality:
    runs-on: ubuntu-22.04
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          source .venv/bin/activate
          ruff check src/ --output-format=github

      - name: Format check with ruff
        run: |
          source .venv/bin/activate
          ruff format --check src/

      - name: Type check with mypy
        # TODO(#51): remove continue-on-error once all pre-existing issues are fixed
        continue-on-error: true
        run: |
          source .venv/bin/activate
          mypy src/ --ignore-missing-imports

      - name: Security scan with bandit
        run: |
          source .venv/bin/activate
          bandit -r src/ -f json -o bandit-report.json --severity-level high
          cat bandit-report.json
          # Fail if any High severity issues found (Medium/Low excluded per security gate policy)
          python scripts/ci_check_bandit.py

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ==========================================================================
  # Stage 2: Security Scan (fast gate for PR/push)
  # Deeper scheduled scans live in security-scan.yml.
  # ==========================================================================
  security:
    runs-on: ubuntu-22.04
    needs: preflight
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -e ".[dev]"

      - name: Dependency vulnerability scan
        run: |
          source .venv/bin/activate
          pip install pip-audit
          # pip-audit exits non-zero when any vulnerability is found; capture the
          # report and let the helper script enforce the HIGH/CRITICAL policy.
          pip-audit --desc --format=json -o pip-audit.json || true
          cat pip-audit.json
          # Fail if any vulnerability with severity HIGH or CRITICAL found
          python scripts/ci_check_pip_audit.py

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          retention-days: 30

      - name: Build Docker image for scan
        run: |
          docker build -f docker/Dockerfile -t aicbc-scan:${{ github.sha }} .

      - name: Scan with Trivy (diagnostic table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aicbc-scan:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: 'true'

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aicbc-scan:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: 'true'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  # ==========================================================================
  # Stage 3: Fast Tests
  # ==========================================================================
  fast-test:
    runs-on: ubuntu-22.04
    needs: quality
    env:
      DEBUG: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -e ".[dev,analysis]"

      - name: Run fast tests
        run: |
          source .venv/bin/activate
          pytest tests/ \
            -v \
            -m "(unit or integration) and not slow and not redteam and not performance and not smoke" \
            --timeout=120 \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=60 \
            --junitxml=test-results/fast.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: fast-test-results
          path: |
            test-results/
            coverage.xml
            htmlcov/
          retention-days: 30

  # ==========================================================================
  # Stage 3b: Fast Red Team Tests
  # ==========================================================================
  redteam-fast:
    runs-on: ubuntu-22.04
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -e ".[dev,analysis]"

      - name: Run fast red team tests
        run: |
          source .venv/bin/activate
          pytest tests/redteam/ \
            -v \
            -m "security and not slow" \
            --timeout=120 \
            --junitxml=test-results/redteam-fast.xml

      - name: Check red-team defense rate
        run: |
          source .venv/bin/activate
          python scripts/check_defense_rate.py test-results/redteam-fast.xml --threshold 0.95

      - name: Upload red team results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-fast-results
          path: |
            test-results/
          retention-days: 30

  # ==========================================================================
  # Stage 3c: Frontend Build & Test
  # ==========================================================================
  frontend:
    runs-on: ubuntu-22.04
    needs: preflight
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Security audit frontend dependencies
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true
          cat npm-audit.json
          # Block on HIGH and CRITICAL vulnerabilities
          npm audit --audit-level=high
        continue-on-error: false

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit.json
          retention-days: 30

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/
          retention-days: 30

  # ==========================================================================
  # Stage 4: Validate Kubernetes Manifests
  # ==========================================================================
  validate-k8s:
    runs-on: ubuntu-22.04
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -e ".[dev]"

      - name: Validate K8s manifests
        run: |
          source .venv/bin/activate
          uv run python scripts/validate_k8s_manifests.py
