# AI_CBC Prometheus Recording Rules
# Pre-aggregated performance metrics for API and LLM SLOs.
# Mounted into the Prometheus container via docker-compose.yml.

groups:
  - name: aicbc_performance
    interval: 15s
    rules:
      - record: aicbc:api_request_p95_seconds
        expr: histogram_quantile(0.95, sum(rate(aicbc_api_request_duration_seconds_bucket[5m])) by (le, job, instance))
      - record: aicbc:api_request_p99_seconds
        expr: histogram_quantile(0.99, sum(rate(aicbc_api_request_duration_seconds_bucket[5m])) by (le, job, instance))
      - record: aicbc:api_requests_per_second
        expr: sum(rate(aicbc_api_requests_total[1m])) by (job, instance)
      - record: aicbc:llm_p95_seconds
        expr: histogram_quantile(0.95, sum(rate(aicbc_llm_latency_seconds_bucket[5m])) by (le, job, instance))
      - record: aicbc:llm_cache_hit_ratio
        expr: |
          (
            sum(rate(aicbc_llm_cache_hits_total[5m])) by (job, instance)
            /
            clamp_min(
              sum(rate(aicbc_llm_cache_hits_total[5m])) by (job, instance)
              + sum(rate(aicbc_llm_cache_misses_total[5m])) by (job, instance),
              1
            )
          )
