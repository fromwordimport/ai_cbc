# AI_CBC Render Deployment Configuration
# For ultra-low-cost personal/small-team hosting (~$0/month).
# This replaces the K8s staging deployment for single-user access.
#
# IMPORTANT: Render's free plan only supports web services, not background workers.
# To run Celery worker and beat on the free tier, all three processes are started
# inside the single web container via supervisord (see docker/supervisord-render.conf).
#
# Setup:
#   1. Fork/push repo to https://github.com/fromwordimport/ai_cbc
#   2. Connect Render dashboard to this repo
#   3. Render reads this file automatically on push
#
# Required external services (all have free tiers):
#   - MongoDB Atlas M0 (database)
#   - Upstash Redis (Celery broker/backend)
#   - Cloudflare (subdomain + proxy)

services:
  # FastAPI web service
  # Also runs Celery worker and Celery beat inside the same container.
  - type: web
    name: aicbc-api
    runtime: docker
    repo: https://github.com/fromwordimport/ai_cbc.git
    rootDir: .
    dockerfilePath: ./docker/Dockerfile
    # Health check endpoint used by Render
    healthCheckPath: /health
    # Free plan sleeps after 15 min idle; acceptable for personal use
    plan: free
    domains:
      - aicbc-api.fromworldimport.com
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000
      - key: API_WORKERS
        value: "1"
      - key: MONGODB_DATABASE
        value: aicbc
      - key: MONGODB_MAX_CONNECTIONS
        value: "20"
      - key: REDIS_PASSWORD
        value: ""
      - key: COST_FUSE_SINGLE_STUDY_CNY
        value: "100"
      - key: COST_FUSE_DAILY_CNY
        value: "200"
      - key: COST_FUSE_WEEKLY_CNY
        value: "500"
      - key: COST_FUSE_MONTHLY_CNY
        value: "1000"
      # Secret values are configured in Render dashboard, not here
      - key: MONGODB_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
        length: 32

  # React + Vite static frontend
  - type: static
    name: aicbc-web
    runtime: static
    repo: https://github.com/fromwordimport/ai_cbc.git
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    domains:
      - aicbc.fromworldimport.com
    envVars:
      - key: VITE_API_BASE_URL
        value: https://aicbc-api.fromworldimport.com/api/v1
      - key: VITE_ROOT_API_BASE_URL
        value: https://aicbc-api.fromworldimport.com
      - key: VITE_API_KEY
        value: dev-key-change-in-prod
